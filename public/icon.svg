<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outermost: Yellow -->
  <rect x="0" y="0" width="100" height="100" rx="18" ry="18" fill="#FFE600"/>
  <!-- Cyan layer -->
  <rect x="3.5" y="3.5" width="93" height="93" rx="15.5" ry="15.5" fill="#00C8F0"/>
  <!-- Red layer -->
  <rect x="7" y="7" width="86" height="86" rx="13" ry="13" fill="#EE1C25"/>
  <!-- White layer -->
  <rect x="10.5" y="10.5" width="79" height="79" rx="11" ry="11" fill="#FFFFFF"/>
  <!-- Dark green main body -->
  <rect x="14" y="14" width="72" height="72" rx="9" ry="9" fill="#0d2b0e"/>

  <!-- FS monogram as white cutouts inside the dark green -->
  <!-- F - vertical bar -->
  <rect x="20" y="22" width="10" height="46" rx="5" ry="5" fill="white"/>
  <!-- F - top horizontal bar -->
  <rect x="20" y="22" width="36" height="10" rx="5" ry="5" fill="white"/>
  <!-- F - middle horizontal bar -->
  <rect x="20" y="41" width="26" height="9" rx="4.5" ry="4.5" fill="white"/>

  <!-- S/E nested shape (smaller, offset right and down) -->
  <!-- S vertical bar -->
  <rect x="38" y="40" width="8" height="30" rx="4" ry="4" fill="white"/>
  <!-- S top bar -->
  <rect x="38" y="40" width="26" height="8" rx="4" ry="4" fill="white"/>
  <!-- S middle bar -->
  <rect x="38" y="55" width="20" height="7" rx="3.5" ry="3.5" fill="white"/>
  <!-- S bottom bar -->
  <rect x="38" y="62" width="26" height="8" rx="4" ry="4" fill="white"/>
</svg>
